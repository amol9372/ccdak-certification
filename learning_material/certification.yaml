  TOPIC:
    # > Use retention.ms = 0 to delete all messages from a topic

    properties:
      - partitions: No of partitions
      - relication.factor: no of replicas for a partition
      - min.insync.replicas (min ISR): 
      - ISR is always synced with the leader:
        - A high min.insync.replicas value prioritizes data durability at the expense of availability.
        - A low min.insync.replicas value prioritizes availability at the expense of data durability.
        - If a leader goes out, one of the ISR is selected as leader, Otherwise producer will be blocked.
      - unclean.leader.election.enable: 
      
         To avoid producer wait & allowing cluster to choose Non-ISR as leader. If all ISR replicas are unavailable, 
         setting this to true allows Kafka to elect a leader from the out-of-sync replicas, 
         which can bring the partition back online more quickly.

      - acks:
        - > acks=0
            Requires NO acknowledgement
        - > acks=1
            Requires acknowledgement from leader
        - > acks=all or -1
            Requires acknowledgement from all ISRs
      - max.poll.records: 
            Kafka consumer configuration that controls the maximum number of records returned in a single call to poll()
            default to "500". If value is greater than it means processing time per message is relatively low.
            Lower value indicates processing time is high.
                      
  
  CONSUMER:
    properties:
      enable.auto.commit:
        - default: true & 5 Seconds
        - true: Consumer will automatically commit offsets after processing messages
        - false: Consumer must manually commit offsets after processing messages


