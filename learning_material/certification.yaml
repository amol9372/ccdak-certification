  SCHEMA REGISTRY:
    Subject:
      Namespace or name of the schema

    auto.register.schemas: > Important
      In the context of Confluent Schema Registry, "auto-registering schemas" typically refers to the ability 
      for producers to automatically register new schemas with the Schema Registry when they produce messages 
      with schemas that haven't been registered before. Should be false in production.
      
    3 Ways to create / evolve schemas: 
      - Schema registry API (non-confluent)
        #> POST /subjects/<subject-name>/versions HTTP/1.1
      - Confluent CLI
        #> confluent schema-registry schema create --subject <subject-name> --schema-file <path-to-schema-file>  
      - Maven, Gradle plugins

    3 Types of Schemas:
      - Avro (default type)
        > Need to provide default values

      - Protobuf (protocol buffers)
        > No Need to provide default values

      - Json (not good due to serialization / deserialization)

