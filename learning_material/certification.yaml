  CONFIGURATION:
    Broker wide default: All Topic configs have a broker wide default. 

    Config types:
     - Static: 
        These are configuration settings that are defined in Kafka's configuration files 
        (typically server.properties for brokers and consumer.properties or producer.properties for clients) 
        and take effect only when the Kafka broker or client is started or restarted.
        eg log.dirs, num.partitions, bootstrap.servers
     - Dynamic: 
        These are configurations that can be modified at runtime without requiring a 
        restart of the Kafka broker or client.  eg Topic configurations (e.g., retention.ms, cleanup.policy)
        > Dynamic configs can be altered using Kafka's admin tools or APIs, such as kafka-configs or the Kafka AdminClient.   
    


  BROKER:
    Broker config:
      - Server.properties (static)
      - Command line
      - AdminClient API
    Config Types:
      - Read-only: Require Broker restart to be updated
      - Per-broker: Can be dynamically updated for each broker
      - Cluster-wide: Can be updated per-broker but cluster wide default, can be dynamically updated
      
    
  STREAMS:
      #> Co-Partitioned, They have the same number of partitions.
      #> The records with the same key are stored in the same partition across all involved topics.     
      
      #> Stateful tranformations need co-partitioned topics.
      #> To avoid co-partitioning, you can use GlobalKTable, which contains partitions for all keys.

      Stateless:
        - branch: split a stream into multiple streams based on a predicate
        - map
        - flatmap: takes a record and produces 0 or more records
        - filter
        - peek: Similar to forEach, but it does not stop processing the stream
        - foreach: terminal operation
        - groupby: Grouping records by key. it is not stateful
        - merge: Merge two streams into one stream
      Stateful:
  
        - count: Count the number of records in a stream
        - reduce: Aggregate records in a stream
        - aggregations         
        - joins
        - Windowing 

      Windows: 
        - Time-based: 
          - Tumbling: Fixed-size, non-overlapping time intervals
          - Hopping: Overlapping time intervals
          - Sliding: Overlapping time intervals with a fixed size  
        - Session-based: Variable-size time intervals based on activity
        - Custom: User-defined time intervals

  REST_PROXY:
    info: 
      REST Proxy is a component of Confluent Platform that allows you to interact with Kafka using HTTP REST APIs.
      It provides a way to produce and consume messages, manage topics, and perform other Kafka operations over HTTP.
      REST Proxy is useful for applications that cannot use the native Kafka protocol or for environments where HTTP is preferred.

    Steps:
      - Create consumer instance 
        #> curl --location 'http://localhost:8082/consumers/my_consumer' \ --header 'Content-Type: application/vnd.kafka.json.v2+json' \ --data '{     "name": "my_consumer_instance", "format": "json", "auto.offset.reset": "earliest" }'       
      - Subscribe to topic(s)
        #> curl --location 'http://localhost:8082/consumers/my_consumer/instances/my_consumer_instance/subscription' \ --header 'Content-Type: application/vnd.kafka.json.v2+json' \ --data '{ "topics": ["my_topic"] }'
      - Consume messages
        #> curl --location 'http://localhost:8082/consumers/my_consumer/instances/my_consumer_instance/records' \ --header 'Accept: application/vnd.kafka.json.v2+json' \ --data '{ "max_bytes": 1048576 }'

Sample Questions:

What is true about partitions? (select two):
  - 1. A partition has a one replica that is leader, while the others replicas are follower.
  - 2. A broker can have the differnt partition for the  same topic on it's disk
  - 3. A broker can have the  partition and the replica of topic on it's disk
  - 4. You can not have more partition than the no of broker in your cluster.

Kafka Partition Strategy: 
  - The default key partitioning strategy in Kafka (DefaultPartitioner class) is to use a hash function on the key of the message.
  - The hash value is then modulo divided by the number of partitions to determine the partition to which the message will be sent.
  - This ensures that messages with the same key will always go to the same partition, 
    which is important for maintaining message order for that key.

A critical formula for the exam is the relationship between acks=all and min.insync.replicas.

Scenario: A topic has replication.factor=3 and min.insync.replicas=2. One broker crashes. Can the producer write?

Analysis: Yes. 3 brokers - 1 crash = 2 available. Since 2 >= min.insync.replicas (2), the write succeeds.

Scenario: A second broker crashes.

Analysis: Now only 1 replica is available. Since 1 < min.insync.replicas (2), the producer with acks=all receives a NotEnoughReplicasException.

Insight: The availability of the system for writes has been sacrificed to guarantee consistency.

